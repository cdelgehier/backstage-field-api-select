---
name: Create Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Extract changelog section
        id: changelog
        run: |
          TAG="${{ steps.version.outputs.tag }}"

          CHANGELOG_SECTION=$(awk -v tag="$TAG" '
            /^## v/ {
              if (found) exit
              if ($2 == tag) found=1
              next
            }
            found {print}
          ' CHANGELOG.md)

          if [ -z "$CHANGELOG_SECTION" ]; then
            CHANGELOG_SECTION=$(cat CHANGELOG.md)
          fi

          echo "$CHANGELOG_SECTION" > release_notes.md

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies and build
        run: task install && task build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          name: Release ${{ steps.version.outputs.tag }}
          body_path: release_notes.md
          tag_name: ${{ steps.version.outputs.tag }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Summary
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          echo "✅ GitHub Release created for $TAG" >> $GITHUB_STEP_SUMMARY
          echo "📦 Published to npm: backstage-field-api-select@${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
